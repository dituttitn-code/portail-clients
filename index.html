<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Espace Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f4f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .login-container {
            background: #ffffff;
            border-radius: 32px;
            padding: 3rem 2.5rem;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid #e9edf4;
        }
        .login-container .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .login-container .logo span { color: #38bdf8; }
        .login-container .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }
        .custom-select-wrapper {
            position: relative;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            transition: border 0.2s;
        }
        .custom-select-wrapper:hover,
        .custom-select-wrapper.active { border-color: #0f172a; }
        .custom-select-trigger {
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            color: #1e293b;
        }
        .custom-select-trigger .arrow {
            margin-left: auto;
            font-size: 0.7rem;
            color: #94a3b8;
            transition: transform 0.2s;
        }
        .custom-select-trigger .arrow.open { transform: rotate(180deg); }
        .custom-select-trigger .placeholder { color: #94a3b8; }
        .custom-select-options {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 260px;
            overflow-y: auto;
        }
        .custom-select-options.open { display: block; }
        .custom-select-options .option {
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            color: #1e293b;
            transition: background 0.15s;
            cursor: pointer;
        }
        .custom-select-options .option:hover { background: #f1f5f9; }
        .custom-select-options .option.selected {
            background: #eef2ff;
            font-weight: 600;
        }
        .custom-select-options .option img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 6px;
        }
        .option .client-name { flex: 1; }
        .initials-fallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .form-group input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            background: #f8fafc;
            transition: border 0.2s;
        }
        .form-group input[type="password"]:focus {
            border-color: #0f172a;
            outline: none;
            background: #ffffff;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #1e293b; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .footer-login {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .footer-login a {
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
        }
        .security-badge {
            background: #fef9c3;
            border: 1px solid #facc15;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #854d0e;
            text-align: center;
            margin-top: 1.5rem;
        }
        @media (max-width: 480px) {
            .login-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">📦 <span>MonEspace</span>Client</div>
    <p class="subtitle">Connectez-vous à votre espace sécurisé</p>

    <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
            <label>👤 Choisissez votre société</label>
            <div class="custom-select-wrapper" id="customSelect">
                <div class="custom-select-trigger" id="selectTrigger">
                    <span class="placeholder">-- Sélectionnez --</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="custom-select-options" id="selectOptions"></div>
            </div>
            <input type="hidden" id="selectedClient" value="" />
        </div>

        <div class="form-group">
            <label for="passwordInput">🔑 Mot de passe</label>
            <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe" required />
        </div>

        <button type="submit" class="btn-login">🚀 Accéder à mon espace</button>

        <div id="errorMessage" class="error-message">
            ⚠️ Nom ou mot de passe incorrect. Veuillez réessayer.
        </div>
    </form>

    <div class="security-badge">
        🔒 <strong>Protection légère</strong> · Pour une sécurité renforcée, 
        <a href="#" style="color:#854d0e; font-weight:600;">contactez-nous</a>.
    </div>

    <!-- ✅ LIEN CORRIGÉ : Pointage direct vers www.gecotelecom.com -->
    <div class="footer-login">
        <a href="https://www.gecotelecom.com">🏠 Retour à l'accueil</a>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════
    //  LISTE DES CLIENTS AVEC LEURS LOGOS EXACTS
    //  ⚠️ Espace dans "logo infra.jpg" encodé en %20
    // ═══════════════════════════════════════════════════
    const CLIENTS = [
        {
            id: 'Metro Optic',
            nom: 'Metro Optic',
            logo: '/logos/logometroptic-1.png',    // Nom exact
            motDePasse: 'MO9300!'
        },
        {
            id: 'Infrastructel',
            nom: 'Infrastructel',
            logo: '/logos/logo%20infra.jpg',       // ✅ Espace encodé en %20
            motDePasse: 'InfraS9300!'
        },
        {
            id: 'Sofiene',
            nom: 'Sofiene',
            logo: '/logos/sofiene.png',
            motDePasse: 'SH1975!'
        }
    ];

    // ---------- INITIALISATION DU SÉLECTEUR ----------
    const trigger = document.getElementById('selectTrigger');
    const optionsContainer = document.getElementById('selectOptions');
    const hiddenInput = document.getElementById('selectedClient');

    function buildOptions() {
        optionsContainer.innerHTML = '';
        CLIENTS.forEach((client) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.dataset.value = client.id;
            div.innerHTML = `
                <img src="${client.logo}" alt="${client.nom}" 
                     onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('beforeend', '<span class=\\'initials-fallback\\'>${client.nom.charAt(0)}</span>');" />
                <span class="client-name">${client.nom}</span>
            `;
            div.addEventListener('click', function(e) {
                e.stopPropagation();
                selectOption(client.id);
            });
            optionsContainer.appendChild(div);
        });
    }
    buildOptions();

    function selectOption(value) {
        const client = CLIENTS.find(c => c.id === value);
        if (!client) return;

        trigger.innerHTML = `
            <img src="${client.logo}" alt="${client.nom}" 
                 onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('beforeend', '<span class=\\'initials-fallback\\'>${client.nom.charAt(0)}</span>');" />
            <span>${client.nom}</span>
            <span class="arrow">▼</span>
        `;
        hiddenInput.value = value;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        const selectedOpt = optionsContainer.querySelector(`.option[data-value="${value}"]`);
        if (selectedOpt) selectedOpt.classList.add('selected');
        optionsContainer.classList.remove('open');
        document.getElementById('customSelect').classList.remove('active');
        document.querySelector('.arrow')?.classList.remove('open');
    }

    trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = optionsContainer.classList.toggle('open');
        document.getElementById('customSelect').classList.toggle('active');
        const arrow = this.querySelector('.arrow');
        if (arrow) arrow.classList.toggle('open');
    });

    document.addEventListener('click', function() {
        optionsContainer.classList.remove('open');
        document.getElementById('customSelect').classList.remove('active');
        const arrow = trigger.querySelector('.arrow');
        if (arrow) arrow.classList.remove('open');
    });

    // ---------- GESTION DU FORMULAIRE ----------
    function handleLogin(event) {
        event.preventDefault();

        const nom = hiddenInput.value;
        const motDePasse = document.getElementById('passwordInput').value;
        const errorDiv = document.getElementById('errorMessage');

        if (!nom) {
            errorDiv.textContent = '⚠️ Veuillez sélectionner votre société.';
            errorDiv.style.display = 'block';
            return false;
        }

        const client = CLIENTS.find(c => c.id === nom);
        if (client && client.motDePasse === motDePasse) {
            sessionStorage.setItem('loggedIn', 'true');
            sessionStorage.setItem('clientName', nom);
            sessionStorage.setItem('clientLogo', client.logo);
            window.location.href = `dashboard.html?client=${encodeURIComponent(nom)}`;
            return false;
        }

        errorDiv.textContent = '⚠️ Nom ou mot de passe incorrect. Veuillez réessayer.';
        errorDiv.style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        return false;
    }

    window.addEventListener('DOMContentLoaded', function() {
        if (sessionStorage.getItem('loggedIn') === 'true') {
            const nom = sessionStorage.getItem('clientName');
            if (nom && CLIENTS.some(c => c.id === nom)) {
                window.location.href = `dashboard.html?client=${encodeURIComponent(nom)}`;
            }
        }
    });
</script>
</body>
</html>
