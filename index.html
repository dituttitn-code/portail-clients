<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Espace Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f4f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .login-container {
            background: #ffffff;
            border-radius: 32px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid #e9edf4;
        }
        .login-container .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .login-container .logo span {
            color: #38bdf8;
        }
        .login-container .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            background: #f8fafc;
            transition: border 0.2s;
            appearance: none;
        }
        .form-group select:focus,
        .form-group input:focus {
            border-color: #0f172a;
            outline: none;
            background: #ffffff;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            background: #1e293b;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
        .footer-login {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .footer-login a {
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
        }
        .security-badge {
            background: #fef9c3;
            border: 1px solid #facc15;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #854d0e;
            text-align: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">📦 <span>MonEspace</span>Client</div>
        <p class="subtitle">Connectez-vous à votre espace sécurisé</p>

        <!-- Formulaire de connexion -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="clientSelect">👤 Choisissez votre nom</label>
                <select id="clientSelect" required>
                    <option value="">-- Sélectionnez --</option>
                    <!-- ⚠️ LISTE DES CLIENTS : Ajoutez/modifiez ici -->
                    <option value="Jean Dupont">Jean Dupont</option>
                    <option value="Marie Martin">Marie Martin</option>
                    <option value="SARL Alpha">SARL Alpha</option>
                    <option value="Projet Beta">Projet Beta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="passwordInput">🔑 Mot de passe</label>
                <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe" required />
            </div>

            <button type="submit" class="btn-login">🚀 Accéder à mon espace</button>

            <div id="errorMessage" class="error-message">
                ⚠️ Nom ou mot de passe incorrect. Veuillez réessayer.
            </div>
        </form>

        <!-- ⚠️ AVERTISSEMENT SÉCURITÉ -->
        <div class="security-badge">
            🔒 <strong>Protection légère</strong> · Pour une sécurité renforcée, 
            <a href="#" style="color:#854d0e; font-weight:600;">contactez-nous</a>.
        </div>

        <div class="footer-login">
            <a href="https://votresite.com">🏠 Retour au site principal</a>
        </div>
    </div>

    <script>
        /**
         * ═══════════════════════════════════════════════════
         *  LISTE DES CLIENTS ET MOTS DE PASSE
         *  ⚠️ À MODIFIER ICI pour ajouter vos clients
         *  ⚠️ Attention : ces mots de passe sont visibles
         *     dans le code source (inspecteur).
         *  Pour une vraie sécurité → solution serveur (PHP)
         * ═══════════════════════════════════════════════════
         */
        const CLIENTS = {
            'Jean Dupont': '1234',
            'Marie Martin': '5678',
            'SARL Alpha': 'alpha2026',
            'Projet Beta': 'beta2026'
        };

        function handleLogin(event) {
            event.preventDefault();

            const nom = document.getElementById('clientSelect').value;
            const motDePasse = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('errorMessage');

            // Vérifier si le nom existe dans la liste
            if (nom && CLIENTS.hasOwnProperty(nom)) {
                // Vérifier le mot de passe
                if (CLIENTS[nom] === motDePasse) {
                    // ⭐ CONNEXION RÉUSSIE
                    // Stocker la session dans le navigateur (sessionStorage)
                    sessionStorage.setItem('loggedIn', 'true');
                    sessionStorage.setItem('clientName', nom);

                    // Rediriger vers la page du client
                    window.location.href = `dashboard.html?client=${encodeURIComponent(nom)}`;
                    return false;
                }
            }

            // ⚠️ Échec de la connexion
            errorDiv.style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
            return false;
        }

        // Petit plus : si le client est DÉJÀ connecté, on le redirige direct
        window.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('loggedIn') === 'true') {
                const nom = sessionStorage.getItem('clientName');
                if (nom && CLIENTS.hasOwnProperty(nom)) {
                    window.location.href = `dashboard.html?client=${encodeURIComponent(nom)}`;
                }
            }
        });
    </script>

</body>
</html>
